<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            margin-top: 50px;
        }
        .header {
            text-align: center;
            color: #333;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .message-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #495057;
            text-align: center;
        }
        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            min-height: 200px;
            background-color: #fafafa;
        }
        .user-msg {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
            max-width: 80%;
        }
        .bot-msg {
            align-self: flex-start;
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0;
            max-width: 80%;
        }
        .empty-history {
            color: #999;
            text-align: center;
            font-style: italic;
            margin-top: 50px;
        }
        form {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #80bdff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h2>💬 Mi Chatbot Integrado</h2>
        </div>

        <!-- Demostración de comunicación Back-Front con Jinja2 (Variables simples) -->
        <div class="message-box">
            <strong>Notificación del Sistema:</strong> {{ mensaje_bienvenida }}
        </div>

        <div class="chat-history">
            <!-- Comprobamos si hay interacciones previas para mostrarlas -->
            {% if pregunta_usuario and respuesta_chatbot %}
                <div class="user-msg">
                    <strong>Tú:</strong><br>
                    {{ pregunta_usuario }}
                </div>
                <div class="bot-msg">
                    <strong>Agente:</strong><br>
                    {{ respuesta_chatbot }}
                </div>
            {% else %}
                <div class="empty-history">El historial de chat está vacío. Inicia la conversación abajo.</div>
            {% endif %}
        </div>

        <!-- Formulario que hace POST a la ruta principal '/' -->
        <form method="POST" action="/">
            <input type="text" name="pregunta" placeholder="Escribe tu pregunta aquí..." required autocomplete="off" autofocus>
            <button type="submit">Enviar</button>
        </form>
    </div>

</body>
</html>
