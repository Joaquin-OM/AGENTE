<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            margin-top: 50px;
        }
        .header {
            text-align: center;
            color: #333;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .message-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #495057;
            text-align: center;
        }
        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            height: 400px; /* Altura fija con scroll */
            overflow-y: auto;
            background-color: #fafafa;
        }
        .user-msg {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            padding: 12px 18px;
            border-radius: 18px 18px 0 18px;
            max-width: 80%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .bot-msg {
            align-self: flex-start;
            background-color: #28a745;
            color: white;
            padding: 12px 18px;
            border-radius: 18px 18px 18px 0;
            max-width: 80%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            white-space: pre-wrap; /* Para respetar saltos de línea */
        }
        .empty-history {
            color: #999;
            text-align: center;
            font-style: italic;
            margin: auto;
        }
        form {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .clear-btn {
            font-size: 14px;
            color: #dc3545;
            text-decoration: none;
            padding: 5px 10px;
            border: 1px solid #dc3545;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background-color: #dc3545;
            color: white;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #80bdff;
        }
        button[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h2>💬 Mi Chatbot Integrado</h2>
        </div>

        <!-- Demostración de comunicación Back-Front con Jinja2 (Variables simples) -->
        <div class="message-box">
            <strong>Notificación del Sistema:</strong> {{ mensaje_bienvenida }}
        </div>

        <div id="chat-history" class="chat-history">
            {% if historial %}
                {% for interact in historial %}
                    <div class="user-msg">
                        <strong>Tú:</strong><br>
                        {{ interact.usuario }}
                    </div>
                    <div class="bot-msg">
                        <strong>Agente:</strong><br>
                        {{ interact.bot }}
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty-history">El historial de chat está vacío. Inicia la conversación abajo.</div>
            {% endif %}
        </div>

        <!-- Formulario que hace POST a la ruta principal '/' -->
        <form method="POST" action="/">
            <input type="text" name="pregunta" placeholder="Escribe tu pregunta aquí..." required autocomplete="off" autofocus>
            <button type="submit">Enviar</button>
        </form>

        <div class="footer-actions">
            <span></span> <!-- Espaciador -->
            <a href="/limpiar" class="clear-btn">Limpiar Historial</a>
        </div>
    </div>

    <script>
        // Auto-scroll al fondo del historial al cargar la página
        const chatHistory = document.getElementById('chat-history');
        chatHistory.scrollTop = chatHistory.scrollHeight;
    </script>

</body>
</html>
